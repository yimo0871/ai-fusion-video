# ============================================
# 融光 - Docker Compose (本地构建镜像)
# ============================================
# 使用方式: docker compose -f docker-compose.build.yml up -d --build
# ============================================

services:
  # ---------- 基础设施 ----------
  mysql:
    image: mysql:8.0
    container_name: fusion-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_fusion_video}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fusion-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- 后端 (本地构建) ----------
  backend:
    build:
      context: ./ai-fusion-video
      dockerfile: Dockerfile
    image: ai-fusion-video:local
    container_name: fusion-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_fusion_video}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY:-sk-placeholder}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m}
    volumes:
      - media_data:/app/data/media
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------- 前端 (本地构建) ----------
  frontend:
    build:
      context: ./ai-fusion-video-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    image: ai-fusion-video-web:local
    container_name: fusion-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
    depends_on:
      - backend

  # ---------- Nginx 反向代理 ----------
  nginx:
    image: nginx:alpine
    container_name: fusion-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
  redis_data:
  media_data:
