name: Publish Docker Images

on:
  push:
    tags:
      - '[0-9]*'   # 匹配 0.2.0、1.0.0、1.0.0-alpha 等版本标签
      - 'v[0-9]*'  # 匹配 v1.0.0、v1.0.0-alpha 等版本标签

env:
  DOCKER_HUB_USERNAME: stonewuu

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: ai-fusion-video/pom.xml

      - name: Build backend JAR
        working-directory: ./ai-fusion-video
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B

      - name: Prepare backend Docker context
        working-directory: ./ai-fusion-video
        run: |
          JAR_PATH=$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*.jar.original' | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No packaged backend jar found"
            exit 1
          fi
          mkdir -p docker-build
          cp "$JAR_PATH" docker-build/app.jar

      # Docker 镜像版本去掉可选的 v 前缀
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------- 后端 ----------
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./ai-fusion-video/docker-build
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            stonewuu/ai-fusion-video:${{ steps.version.outputs.VERSION }}
            stonewuu/ai-fusion-video:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ---------- 前端 ----------
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./ai-fusion-video-web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            stonewuu/ai-fusion-video-web:${{ steps.version.outputs.VERSION }}
            stonewuu/ai-fusion-video-web:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
